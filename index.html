<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX</title>
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #07070d;
            color: #c8c8d4;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(14, 14, 24, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 28px 24px 32px;
            border: 1px solid rgba(139, 0, 255, 0.12);
            box-shadow: 0 8px 60px rgba(0, 0, 0, 0.8), 0 0 80px rgba(139, 0, 255, 0.03);
            text-align: center;
            transition: all 0.4s ease;
        }

        .container:hover {
            border-color: rgba(139, 0, 255, 0.2);
            box-shadow: 0 8px 70px rgba(0, 0, 0, 0.9), 0 0 100px rgba(139, 0, 255, 0.05);
        }

        /* ========== JUDUL + GLOWING ========== */
        .title {
            font-size: 22px;
            font-weight: 300;
            color: #a0a0b8;
            letter-spacing: 10px;
            margin-bottom: 2px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        .title strong {
            color: #8b00ff;
            font-weight: 400;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px rgba(139, 0, 255, 0.3),
                0 0 20px rgba(139, 0, 255, 0.15),
                0 0 40px rgba(139, 0, 255, 0.08),
                0 0 80px rgba(139, 0, 255, 0.04);
            animation: glowPulse 3s ease-in-out infinite;
            transition: text-shadow 0.3s ease;
        }

        .title strong:hover {
            text-shadow: 
                0 0 15px rgba(139, 0, 255, 0.5),
                0 0 30px rgba(139, 0, 255, 0.25),
                0 0 60px rgba(139, 0, 255, 0.12),
                0 0 100px rgba(139, 0, 255, 0.06);
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(139, 0, 255, 0.3),
                    0 0 20px rgba(139, 0, 255, 0.15),
                    0 0 40px rgba(139, 0, 255, 0.08);
            }
            50% {
                text-shadow: 
                    0 0 15px rgba(139, 0, 255, 0.5),
                    0 0 30px rgba(139, 0, 255, 0.25),
                    0 0 60px rgba(139, 0, 255, 0.12),
                    0 0 100px rgba(139, 0, 255, 0.06);
            }
        }

        .subtitle {
            font-size: 9px;
            color: #444466;
            letter-spacing: 3px;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(139, 0, 255, 0.06);
            padding-bottom: 14px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .subtitle span {
            color: #666688;
        }

        /* ===== VIDEO WRAPPER (UKURAN SEDANG) ===== */
        .video-wrapper {
            position: relative;
            border: 1px solid rgba(139, 0, 255, 0.15);
            border-radius: 12px;
            padding: 3px;
            background: rgba(0, 0, 0, 0.4);
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .video-wrapper:hover {
            border-color: rgba(139, 0, 255, 0.3);
            box-shadow: 0 4px 40px rgba(139, 0, 255, 0.06);
        }

        .video-wrapper video {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 9px;
            display: block;
            background: #000;
        }

        /* ===== TOMBOL SOUND ===== */
        .sound-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(139, 0, 255, 0.2);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #8888aa;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .sound-btn:hover {
            background: rgba(139, 0, 255, 0.25);
            border-color: rgba(139, 0, 255, 0.5);
            color: #ffffff;
            transform: scale(1.06);
        }

        .sound-btn:active {
            transform: scale(0.94);
        }

        .sound-btn .icon {
            line-height: 1;
            font-size: 14px;
        }

        /* ===== SCRIPT BOX ===== */
        .script-box {
            background: rgba(17, 17, 31, 0.7);
            border-radius: 10px;
            padding: 12px 14px;
            border-left: 2px solid #8b00ff;
            text-align: left;
            margin-bottom: 14px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .script-box:hover {
            background: rgba(17, 17, 31, 0.9);
            border-left-color: #a020ff;
        }

        .script-box .label {
            color: #555577;
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .script-box code {
            color: #66ddcc;
            font-size: 11px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.6;
            display: block;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ===== TOMBOL COPY ===== */
        .btn-copy {
            background: transparent;
            color: #8888aa;
            border: 1px solid rgba(139, 0, 255, 0.2);
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 10px;
            font-weight: 400;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            max-width: 160px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .btn-copy:hover {
            background: rgba(139, 0, 255, 0.12);
            border-color: rgba(139, 0, 255, 0.4);
            color: #ffffff;
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.04);
        }

        .btn-copy:active {
            transform: scale(0.97);
        }

        /* ===== FOOTER ===== */
        .footer-link {
            margin-top: 14px;
            font-size: 8px;
            color: #333355;
            letter-spacing: 1.5px;
        }

        .footer-link a {
            color: #444466;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 300;
        }

        .footer-link a:hover {
            color: #8b00ff;
        }

        .footer-link .dev {
            color: #222244;
            font-size: 7px;
            display: block;
            margin-top: 4px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .container {
                padding: 20px 16px 24px;
            }
            .title {
                font-size: 18px;
                letter-spacing: 8px;
            }
            .video-wrapper {
                max-width: 300px;
            }
            .video-wrapper video {
                max-height: 180px;
            }
            .script-box code {
                font-size: 9.5px;
            }
        }

        @media (max-width: 340px) {
            .video-wrapper {
                max-width: 240px;
            }
            .video-wrapper video {
                max-height: 140px;
            }
            .container {
                padding: 16px 12px 20px;
            }
            .title {
                font-size: 15px;
                letter-spacing: 6px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- JUDUL + GLOWING -->
    <div class="title"><strong>VORTEX</strong></div>
    <div class="subtitle">project <span>by zeff</span></div>

    <!-- VIDEO -->
    <div class="video-wrapper">
        <video id="mainVideo" autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/oh9g1h.mp4" type="video/mp4">
            Browser tidak support video.
        </video>
        <button class="sound-btn" id="soundToggle" onclick="toggleSound()" aria-label="Toggle sound">
            <span class="icon" id="soundIcon">◌</span>
        </button>
    </div>

    <!-- SCRIPT -->
    <div class="script-box">
        <div class="label">link script</div>
        <code>loadstring(game:HttpGet("https://zeffvortexscript.vercel.app/script.lua"))()</code>
    </div>

    <!-- COPY -->
    <button class="btn-copy" onclick="copyScript()">copy script</button>

    <!-- FOOTER -->
    <div class="footer-link">
        <a href="https://zeffvortexscript.vercel.app/script.lua" target="_blank">zeffvortexscript.vercel.app</a>
        <span class="dev">web by zeff</span>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const soundIcon = document.getElementById('soundIcon');
    let isMuted = true;

    function toggleSound() {
        if (isMuted) {
            video.muted = false;
            soundIcon.textContent = '◉';
            isMuted = false;
        } else {
            video.muted = true;
            soundIcon.textContent = '◌';
            isMuted = true;
        }
    }

    video.addEventListener('click', toggleSound);

    function copyScript() {
        const text = 'loadstring(game:HttpGet("https://zeffvortexscript.vercel.app/script.lua"))()';
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.textContent = 'tersalin';
            btn.style.color = '#66ddcc';
            btn.style.borderColor = 'rgba(102, 221, 204, 0.3)';
            setTimeout(() => {
                btn.textContent = 'copy script';
                btn.style.color = '#8888aa';
                btn.style.borderColor = 'rgba(139, 0, 255, 0.2)';
            }, 1500);
        }).catch(() => {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            const btn = document.querySelector('.btn-copy');
            btn.textContent = 'tersalin';
            setTimeout(() => {
                btn.textContent = 'copy script';
            }, 1500);
        });
    }
</script>

</body>
</html>
