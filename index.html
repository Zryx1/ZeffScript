<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VORTEX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #c8c8d4;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 460px;
            width: 100%;
            background: rgba(12, 12, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px 22px 24px;
            border: 1px solid rgba(139, 0, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* ===== LOGO ===== */
        .logo {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #a0a0b8;
        }

        .logo strong {
            color: #a020ff;
            font-weight: 500;
            text-shadow: 0 0 20px rgba(139, 0, 255, 0.15), 0 0 40px rgba(139, 0, 255, 0.05);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 15px rgba(139,0,255,0.15), 0 0 30px rgba(139,0,255,0.05); }
            50% { text-shadow: 0 0 25px rgba(139,0,255,0.3), 0 0 50px rgba(139,0,255,0.1); }
        }

        .subtitle {
            font-size: 9px;
            color: #444466;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(139, 0, 255, 0.05);
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        .subtitle span {
            color: #8888bb;
        }

        /* ===== VIDEO ===== */
        .video-wrapper {
            position: relative;
            border: 1.5px solid rgba(139, 0, 255, 0.12);
            border-radius: 12px;
            padding: 3px;
            background: rgba(0, 0, 0, 0.4);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .video-wrapper video {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 9px;
            display: block;
            background: #000;
        }

        /* ===== SOUND BUTTON ===== */
        .sound-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(139, 0, 255, 0.2);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #aaaac0;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .sound-btn:hover {
            background: rgba(139, 0, 255, 0.2);
            color: #ffffff;
        }

        /* ===== SCRIPT BOX ===== */
        .script-box {
            background: rgba(17, 17, 31, 0.6);
            border-radius: 10px;
            padding: 12px 14px;
            border-left: 2px solid #8b00ff;
            text-align: left;
            margin-bottom: 14px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .script-box .label {
            color: #555577;
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 3px;
        }

        .script-box code {
            color: #66ddcc;
            font-size: 11px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            word-break: break-all;
            line-height: 1.5;
            display: block;
        }

        /* ===== COPY BUTTON ===== */
        .copy-wrapper {
            display: inline-block;
            padding: 2px;
            border-radius: 10px;
            background: linear-gradient(90deg, #8b00ff, #c864ff, #8b00ff);
            background-size: 300% 100%;
            animation: borderMove 5s linear infinite;
        }

        @keyframes borderMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        .copy-btn {
            background: rgba(10, 10, 18, 0.95);
            border: none;
            border-radius: 8px;
            padding: 8px 24px;
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8888aa;
            width: 100%;
            min-width: 140px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            color: #ffffff;
            background: rgba(20, 20, 35, 0.95);
        }

        .copy-btn.copied {
            color: #66ddcc;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 16px;
            font-size: 8px;
            color: #333355;
            letter-spacing: 1.5px;
        }

        .footer a {
            color: #444466;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer a:hover {
            color: #8b00ff;
        }

        .footer .dev {
            color: #222244;
            font-size: 7px;
            display: block;
            margin-top: 3px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .container { padding: 20px 14px 18px; }
            .logo { font-size: 20px; letter-spacing: 8px; }
            .video-wrapper video { max-height: 180px; }
            .script-box code { font-size: 9px; }
            .sound-btn { width: 28px; height: 28px; font-size: 10px; bottom: 8px; right: 8px; }
            .copy-btn { min-width: 120px; padding: 6px 16px; font-size: 9px; }
        }

        @media (max-width: 340px) {
            .video-wrapper video { max-height: 140px; }
            .container { padding: 14px 10px 14px; }
            .logo { font-size: 16px; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGO -->
    <div class="logo"><strong>VORTEX</strong></div>
    <div class="subtitle">project <span>by zeff</span></div>

    <!-- VIDEO -->
    <div class="video-wrapper">
        <video id="mainVideo" autoplay loop muted playsinline preload="metadata">
            <source src="https://files.catbox.moe/oh9g1h.mp4" type="video/mp4" />
        </video>
        <button class="sound-btn" id="soundToggle">
            <span id="soundIcon">◌</span>
        </button>
    </div>

    <!-- SCRIPT -->
    <div class="script-box">
        <div class="label">link script</div>
        <code>loadstring(game:HttpGet("https://zeffvortexscript.vercel.app/script.lua"))()</code>
    </div>

    <!-- COPY -->
    <div class="copy-wrapper">
        <button class="copy-btn" id="copyBtn">copy script</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <a href="https://zeffvortexscript.vercel.app/script.lua" target="_blank">zeffvortexscript.vercel.app</a>
        <span class="dev">web by zeff</span>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ===== VIDEO =====
        const video = document.getElementById('mainVideo');
        const soundIcon = document.getElementById('soundIcon');
        let isMuted = true;

        function toggleSound() {
            if (isMuted) {
                video.muted = false;
                soundIcon.textContent = '◉';
                isMuted = false;
            } else {
                video.muted = true;
                soundIcon.textContent = '◌';
                isMuted = true;
            }
        }

        document.getElementById('soundToggle').addEventListener('click', toggleSound);
        video.addEventListener('click', toggleSound);

        // Play otomatis
        video.addEventListener('loadeddata', function() {
            video.play().catch(function() {});
        });

        // Fallback
        setTimeout(function() {
            video.play().catch(function() {});
        }, 300);

        // Pause kalo gak keliatan
        if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        if (video.paused) video.play().catch(function() {});
                    } else {
                        if (!video.paused) video.pause();
                    }
                });
            }, { threshold: 0.2 });
            observer.observe(video);
        }

        // ===== COPY =====
        const copyBtn = document.getElementById('copyBtn');
        const scriptText = 'loadstring(game:HttpGet("https://zeffvortexscript.vercel.app/script.lua"))()';

        copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(scriptText).then(function() {
                copyBtn.textContent = 'tersalin';
                copyBtn.classList.add('copied');
                setTimeout(function() {
                    copyBtn.textContent = 'copy script';
                    copyBtn.classList.remove('copied');
                }, 1500);
            }).catch(function() {
                const textarea = document.createElement('textarea');
                textarea.value = scriptText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyBtn.textContent = 'tersalin';
                copyBtn.classList.add('copied');
                setTimeout(function() {
                    copyBtn.textContent = 'copy script';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        });

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', function() {
            video.pause();
            video.src = '';
            video.load();
        });

    })();
</script>

</body>
</html>
